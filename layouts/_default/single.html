    <meta charset="utf-8">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #000;          /* 絕對黑 */
            background: #fff;     /* 絕對白 */
            max-width: 800px;     /* 限制寬度，方便閱讀 */
            margin: 40px auto;    /* 居中 */
            padding: 0 20px;
        }
        h1, h2, h3 { line-height: 1.2; }
        a { color: #00e; }        /* 傳統藍色連結，易於辨識 */

        /* Chroma 程式碼高亮基礎樣式 (如果 style設定為深色) */
        .highlight pre {
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto; /* 支援橫向捲動 */
        }
    </style>
</head>
<body>
    <header>
        <a href="/">← 回首頁</a>
    </header>

    <main>
        <article>
            <h1>{{ .Title }}</h1>
            <time>{{ .Date.Format "2006-01-02" }}</time>
            <hr>
            {{ .Content }}
        </article>
    </main>

    <footer>
        <hr>
        <p>&copy; {{ .Date.Format "2006" }} 你的名字</p>
    </footer>
</body>
