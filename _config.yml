layouts_dir: _layout

# CommonMark (used by GitHub Pages via jekyll-commonmark-ghpages)
# - "table" extension is essential for GFM pipe tables to render as <table> HTML
# - UNSAFE allows raw HTML inside markdown (e.g. <br> inside table cells)
# - SMART is intentionally omitted: it converts --- to em dashes which breaks table separators
commonmark:
  options: ["UNSAFE"]
  extensions: ["strikethrough", "autolink", "table", "tagfilter"]

collections:
  notes:
    output: true

collections_dir: content

defaults:
  - scope:
      path: ""
      type: notes
    values:
      layout: default
