<style>
/* ── Code block font size ── */
pre, code {
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 1.05em;
}

/* ── Rouge / Monokai syntax highlighting ── */
.highlight {
  background: #272822;
  color: #f8f8f2;
  border-radius: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  line-height: 1.5;
  margin: 1em 0;
}
.highlight pre {
  background: transparent;
  color: inherit;
  padding: 0;
  margin: 0;
  font-size: inherit;
  border: none;
}
.highlight code {
  background: transparent;
  color: inherit;
  font-size: inherit;
  padding: 0;
}

/* Inline code (outside blocks) */
:not(.hljs) > code,
p > code, li > code, td > code, h1 > code, h2 > code, h3 > code, h4 > code {
  background: #f0f0f0;
  color: #c7254e;
  padding: 2px 5px;
  border-radius: 3px;
}
.highlight code { background: transparent; color: inherit; padding: 0; }

/* Comments */
.highlight .c,
.highlight .c1,
.highlight .cm,
.highlight .cs  { color: #75715e; font-style: italic; }

/* Preprocessor / macro directives */
.highlight .cp  { color: #75715e; }

/* Keywords */
.highlight .k,
.highlight .kd,
.highlight .kn,
.highlight .kr,
.highlight .kp,
.highlight .kc  { color: #66d9ef; font-weight: bold; }

/* Keyword types (int, char, bool …) */
.highlight .kt  { color: #66d9ef; font-weight: bold; }

/* Strings */
.highlight .s,
.highlight .s1,
.highlight .s2,
.highlight .sb,
.highlight .sc,
.highlight .sd,
.highlight .se,
.highlight .sh,
.highlight .si,
.highlight .sx  { color: #e6db74; }

/* Numbers */
.highlight .m,
.highlight .mi,
.highlight .mf,
.highlight .mh,
.highlight .mo,
.highlight .il  { color: #ae81ff; }

/* Function / method names */
.highlight .nf,
.highlight .fm  { color: #a6e22e; }

/* Class / type names */
.highlight .nc,
.highlight .nn  { color: #a6e22e; font-weight: bold; }

/* Operators */
.highlight .o,
.highlight .ow  { color: #f92672; }

/* Identifiers / variables */
.highlight .n,
.highlight .na,
.highlight .nb,
.highlight .ni,
.highlight .nl,
.highlight .nv,
.highlight .vc,
.highlight .vg,
.highlight .vi  { color: #f8f8f2; }

/* Punctuation */
.highlight .p   { color: #f8f8f2; }

/* Boolean / special constants */
.highlight .nb  { color: #66d9ef; }

/* Line numbers (gutter) */
.highlight .gl  { color: #7f7f7f; user-select: none; }
</style>

<!-- highlight.js — CUDA syntax highlighting (Rouge has no CUDA lexer) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<style>
/* ── CUDA-specific token colours (Monokai palette) ── */

/* __global__, __device__, __host__, __shared__, __constant__, __managed__, __restrict__ */
.hljs-cuda-qualifier        { color: #f92672; font-weight: bold; }

/* threadIdx, blockIdx, blockDim, gridDim, warpSize */
.hljs-cuda-builtin-var      { color: #fd971f; font-weight: bold; }

/* cudaMalloc, cudaMemcpy, cudaFree, cudaDeviceSynchronize, … */
.hljs-cuda-runtime          { color: #66d9ef; }

/* <<< >>> launch chevrons */
.hljs-cuda-launch-chevron   { color: #f92672; font-weight: bold; }

/* Wrap the highlight.js block background to match Monokai */
.highlight > .hljs-cuda-wrap,
pre:has(code.language-cuda) { background: #272822; }

/* Make highlight.js output look the same as Rouge blocks */
.hljs {
  background: #272822 !important;
  color: #f8f8f2 !important;
  border-radius: 6px;
  padding: 12px 16px !important;
  font-size: 1.05em;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  line-height: 1.5;
  overflow-x: auto;
}
</style>
<script>
(function () {
  // ── Register a custom 'cuda' language that extends C++ ──
  hljs.registerLanguage('cuda', function (hljs) {
    // Get the already-compiled C++ language object (contains live RegExp objects).
    // Do NOT JSON.stringify/parse — that silently drops all RegExp patterns.
    var cpp = hljs.getLanguage('cpp');

    // CUDA-specific rules prepended so they take priority over C++ rules.
    var cudaRules = [
      // Execution-space qualifiers: __global__, __device__, etc.
      {
        className: 'cuda-qualifier',
        begin: /\b(__global__|__device__|__host__|__shared__|__constant__|__managed__|__restrict__)\b/
      },
      // Built-in variables: threadIdx.x, blockIdx.y, …
      {
        className: 'cuda-builtin-var',
        begin: /\b(threadIdx|blockIdx|blockDim|gridDim|warpSize)\b/
      },
      // CUDA runtime API calls: cudaMalloc, cudaMemcpy, cudaFree, …
      {
        className: 'cuda-runtime',
        begin: /\bcuda[A-Za-z][A-Za-z0-9_]*/
      },
      // Kernel launch chevrons <<<  >>>
      {
        className: 'cuda-launch-chevron',
        begin: /<<<|>>>/
      }
    ];

    return {
      name: 'CUDA',
      aliases: ['cuda'],
      keywords: cpp.keywords,
      contains: cudaRules.concat(cpp.contains || [])
    };
  });

  document.addEventListener('DOMContentLoaded', function () {
    // Match class names produced by Rouge for ```cuda and ```cuda= blocks:
    // language-cuda  /  language-cuda=  /  language-cudaa  /  language-cudaa=
    var selector = [
      'code.language-cuda',
      'code[class*="language-cuda"]',
      'code.language-cudaa',
      'code[class*="language-cudaa"]'
    ].join(', ');

    document.querySelectorAll(selector).forEach(function (block) {
      // Strip any residual Rouge empty-span markup, keep raw text only
      block.textContent = block.textContent;
      block.className   = 'language-cuda';
      hljs.highlightElement(block);

      // Remove background from the inner <pre> so the .hljs block controls it
      var pre = block.closest('pre');
      if (pre) {
        pre.style.background = 'transparent';
        pre.style.padding    = '0';
        pre.style.margin     = '0';
        pre.style.border     = 'none';
      }
      // Let the outer .highlight wrapper use the same dark background
      var wrap = block.closest('.highlight');
      if (wrap) wrap.style.background = '#272822';
    });
  });
}());
</script>

</head>

<body>

  {{ content }}
</body>
