<style>
/* ── Code block font size ── */
pre, code {
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 1.05em;
}

/* ── Rouge / Monokai syntax highlighting ── */
.highlight {
  background: #272822;
  color: #f8f8f2;
  border-radius: 6px;
  padding: 12px 16px;
  overflow-x: auto;
  line-height: 1.5;
  margin: 1em 0;
}
.highlight pre {
  background: transparent;
  color: inherit;
  padding: 0;
  margin: 0;
  font-size: inherit;
  border: none;
}
.highlight code {
  background: transparent;
  color: inherit;
  font-size: inherit;
  padding: 0;
}

/* Inline code (outside blocks) */
code {
  background: #f0f0f0;
  color: #c7254e;
  padding: 2px 5px;
  border-radius: 3px;
}
.highlight code { background: transparent; color: inherit; padding: 0; }

/* Comments */
.highlight .c,
.highlight .c1,
.highlight .cm,
.highlight .cs  { color: #75715e; font-style: italic; }

/* Preprocessor / macro directives */
.highlight .cp  { color: #75715e; }

/* Keywords */
.highlight .k,
.highlight .kd,
.highlight .kn,
.highlight .kr,
.highlight .kp,
.highlight .kc  { color: #66d9ef; font-weight: bold; }

/* Keyword types (int, char, bool …) */
.highlight .kt  { color: #66d9ef; font-weight: bold; }

/* Strings */
.highlight .s,
.highlight .s1,
.highlight .s2,
.highlight .sb,
.highlight .sc,
.highlight .sd,
.highlight .se,
.highlight .sh,
.highlight .si,
.highlight .sx  { color: #e6db74; }

/* Numbers */
.highlight .m,
.highlight .mi,
.highlight .mf,
.highlight .mh,
.highlight .mo,
.highlight .il  { color: #ae81ff; }

/* Function / method names */
.highlight .nf,
.highlight .fm  { color: #a6e22e; }

/* Class / type names */
.highlight .nc,
.highlight .nn  { color: #a6e22e; font-weight: bold; }

/* Operators */
.highlight .o,
.highlight .ow  { color: #f92672; }

/* Identifiers / variables */
.highlight .n,
.highlight .na,
.highlight .nb,
.highlight .ni,
.highlight .nl,
.highlight .nv,
.highlight .vc,
.highlight .vg,
.highlight .vi  { color: #f8f8f2; }

/* Punctuation */
.highlight .p   { color: #f8f8f2; }

/* Boolean / special constants */
.highlight .nb  { color: #66d9ef; }

/* Line numbers (gutter) */
.highlight .gl  { color: #7f7f7f; user-select: none; }
</style>

<!-- highlight.js (only for CUDA blocks — Rouge doesn't have a cuda lexer) -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai-sublime.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // Rouge wraps unknown languages as: <div class="highlight"><pre><code class="language-cuda">
    // We treat cuda/cudaa as C++ for highlighting purposes.
    document.querySelectorAll('code.language-cuda, code.language-cudaa').forEach(function (block) {
      // Reset any prior Rouge plain-text wrapping by stripping empty spans
      block.innerHTML = block.textContent;
      // Tell highlight.js to parse as C++
      block.className = 'language-cpp';
      hljs.highlightElement(block);
      // Give the parent <pre> / wrapper the same monokai look
      var pre = block.closest('pre');
      if (pre) {
        pre.style.background = 'transparent';
        pre.style.padding    = '0';
        pre.style.margin     = '0';
      }
      var wrap = block.closest('.highlight');
      if (wrap) {
        wrap.style.background = '#23241f'; // monokai-sublime background
      }
    });
  });
</script>

</head>

<body>

  {{ content }}
</body>
